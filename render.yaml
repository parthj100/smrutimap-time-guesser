services:
  - type: web
    name: smrutimap-time-guesser
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "18"
      # Values are managed in the Render dashboard (Environment tab), not in git.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
    autoDeploy: true
    branch: main
    repo: https://github.com/parthj100/smrutimap-time-guesser.git 